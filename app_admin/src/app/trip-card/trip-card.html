<div class="card h-100">

  <div class="card-header">
    {{ trip.name }}
  </div>

  <img 
    class="card-img-top"
    [src]="trip.image"
    alt="Trip image"
  />

  <div class="card-body">

    <h6 class="card-subtitle mb-2 text-muted">
      {{ trip.resort }}
    </h6>

    <p class="card-subtitle mt-3 mb-3 text-muted">
      {{ trip.length }} only {{ trip.perPerson | currency:'USD' }} per person
    </p>

    <!-- ✅ FIX DESCRIPTION -->
    <p class="card-text" [innerHTML]="trip.description"></p>

    <!-- ✅ EDIT BUTTON -->
    <button class="btn btn-warning mt-2" (click)="editTrip()">
      Edit Trip
    </button>

  </div>

</div>
