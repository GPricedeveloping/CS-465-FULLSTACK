<div class="card h-100">

  <div class="card-header">
    {{ trip.name }}
  </div>

  <img 
    [src]="'assets/images/' + trip.image"
    class="card-img-top"
    alt="Trip image"
  >

  <div class="card-body d-flex flex-column">

    <h6 class="card-subtitle mb-2 text-muted">
      {{ trip.resort }}
    </h6>

    <p class="card-subtitle mt-3 mb-2 text-muted">
      {{ trip.length }} only {{ trip.perPerson | currency:'USD' }} per person
    </p>

    <p class="card-text" [innerHTML]="trip.description"></p>

    <!-- BUTTONS -->
    <div class="mt-auto">

      <!-- EDIT -->
      <button 
        class="btn btn-warning btn-sm w-100 mb-2"
        (click)="editTrip(trip.code)">
        Edit Trip
      </button>

      <!-- DELETE -->
      <button 
        class="btn btn-danger btn-sm w-100"
        (click)="deleteTrip(trip.code)">
        Delete Trip
      </button>

    </div>

  </div>

</div>
