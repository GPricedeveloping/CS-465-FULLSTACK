<div class="col-md-6 offset-md-3 mt-4">
  <h2 class="text-center">Edit Trip</h2>

  <form *ngIf="addForm" [formGroup]="addForm" (ngSubmit)="onSubmit()">

    <!-- CODE -->
    <div class="form-group mb-3">
      <label>Code</label>
      <input type="text" formControlName="code" class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['code'].errors }">

      <div *ngIf="submitted && f['code'].errors" class="text-danger">
        Trip Code is required
      </div>
    </div>

    <!-- NAME -->
    <div class="form-group mb-3">
      <label>Name</label>
      <input type="text" formControlName="name" class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['name'].errors }">

      <div *ngIf="submitted && f['name'].errors" class="text-danger">
        Name is required
      </div>
    </div>

    <!-- LENGTH -->
    <div class="form-group mb-3">
      <label>Length</label>
      <input type="text" formControlName="length" class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['length'].errors }">

      <div *ngIf="submitted && f['length'].errors" class="text-danger">
        Length is required
      </div>
    </div>

    <!-- START -->
    <div class="form-group mb-3">
      <label>Start Date</label>
      <input type="date" formControlName="start" class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['start'].errors }">

      <div *ngIf="submitted && f['start'].errors" class="text-danger">
        Date is required
      </div>
    </div>

    <!-- RESORT -->
    <div class="form-group mb-3">
      <label>Resort</label>
      <input type="text" formControlName="resort" class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['resort'].errors }">

      <div *ngIf="submitted && f['resort'].errors" class="text-danger">
        Resort is required
      </div>
    </div>

    <!-- PRICE -->
    <div class="form-group mb-3">
      <label>Per Person</label>
      <input type="number" formControlName="perPerson" class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['perPerson'].errors }">

      <div *ngIf="submitted && f['perPerson'].errors" class="text-danger">
        Price is required
      </div>
    </div>

    <!-- IMAGE -->
    <div class="form-group mb-3">
      <label>Image Name</label>
      <input type="text" formControlName="image" class="form-control"
        placeholder="reef1.jpg"
        [ngClass]="{ 'is-invalid': submitted && f['image'].errors }">

      <div *ngIf="submitted && f['image'].errors" class="text-danger">
        Image is required
      </div>
    </div>

    <!-- DESCRIPTION -->
    <div class="form-group mb-3">
      <label>Description</label>
      <textarea formControlName="description" class="form-control"
        [ngClass]="{ 'is-invalid': submitted && f['description'].errors }"></textarea>

      <div *ngIf="submitted && f['description'].errors" class="text-danger">
        Description is required
      </div>
    </div>

    <!-- BUTTON -->
    <button type="submit" class="btn btn-info w-100">
      Save Trip
    </button>

  </form>
</div>
